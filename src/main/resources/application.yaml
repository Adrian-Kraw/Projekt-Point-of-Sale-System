spring:
  application:
    name: kassensystem

---
# Profil: Entwicklung (lokal)
# Damit IntelliJ weiß dass es lokal `application-dev.yml` nutzen soll:
#  1. "Edit Configurations..."
#  2. Deine Spring Boot Run Configuration auswählen
#  3. unter Active Profiles `dev` eingeben

# WICHTIG: Passwort NICHT hier eintragen!
# Lege stattdessen eine lokale application-dev.yml an, hier sieht man nur wie sie aussehen soll
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/kassensystem
    username: postgres
    password: DEIN_PASSWORT
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

---
# Profil: Production (Docker)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

vaadin:
  launch-browser: false

---
# Profil: Test (H2 In-Memory)
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect